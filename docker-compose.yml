  services:
    postgres:
      image: pgvector/pgvector:pg16
      container_name: a-stock-postgres
      environment:
        POSTGRES_DB: a_stock_agent_studio
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
      ports:
        - "15432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
        - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d a_stock_agent_studio"]
        interval: 10s
        timeout: 5s
        retries: 5

    redis:
      image: redis:7-alpine
      container_name: a-stock-redis
      ports:
        - "6379:6379"
      volumes:
        - redis_data:/data
      command: redis-server --appendonly yes
      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 10s
        timeout: 5s
        retries: 5

  volumes:
    postgres_data:
    redis_data: